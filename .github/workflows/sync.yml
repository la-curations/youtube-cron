name: Daily YouTube Movies Sync

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 02:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Movie Synchronization Script
        env:
          YOUTUBE_API_KEYS: ${{ secrets.YOUTUBE_API_KEYS }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node syncYoutubeMovies.js

      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sync_config.json movies_all.json movies_delta.json
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update movie library database [skip ci]"
            git push
          else
            echo "No updates to commit."
          fi

      - name: Purge jsDelivr Cache
        run: |
          curl -i https://purge.jsdelivr.net/gh/la-curations/youtube-cron@main/movies_all.json
          curl -i https://purge.jsdelivr.net/gh/la-curations/youtube-cron@main/movies_delta.json
          curl -i https://purge.jsdelivr.net/gh/la-curations/youtube-cron/movies_all.json
          curl -i https://purge.jsdelivr.net/gh/la-curations/youtube-cron/movies_delta.json
